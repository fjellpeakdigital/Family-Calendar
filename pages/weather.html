<!-- Weather Page Template -->
<div id="weather-page" class="page-content">

  <!-- Current Conditions -->
  <div class="weather-current">
    <div id="weather-icon-big" class="weather-icon-big">⛅</div>
    <div id="weather-temp-big" class="weather-temp-big">--°</div>
    <div id="weather-condition" class="weather-condition">Loading weather…</div>
    <div id="weather-feels" class="weather-feels"></div>
    <div id="weather-meta" class="weather-meta">
      <span id="weather-city"></span>
      <span id="weather-updated"></span>
      <span id="weather-humidity"></span>
      <span id="weather-wind"></span>
    </div>
  </div>

  <!-- 7-Day Forecast Strip -->
  <div id="weather-forecast-strip" class="weather-forecast-strip">
    <!-- Populated by weather.js -->
    <div class="loading-wrap" style="width:100%">
      <div class="spinner"></div>
    </div>
  </div>

</div>
