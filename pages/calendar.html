<!-- Calendar Page Template -->
<div id="calendar-page" class="page-content">

  <!-- Left: Today's Agenda (40%) -->
  <div class="calendar-panel">
    <div class="calendar-panel-inner">
      <div class="section-label today-label">Today</div>
      <div id="today-events-list" class="today-events-list">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <span>Loading calendar…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Upcoming 2 Weeks (60%) -->
  <div class="calendar-panel">
    <div class="calendar-panel-inner">
      <div class="section-label">Upcoming</div>
      <div id="upcoming-events-list" class="upcoming-list">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <span>Loading events…</span>
        </div>
      </div>
    </div>
  </div>

</div>
