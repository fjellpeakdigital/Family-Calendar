<!-- Calendar Page — Week / Month view -->
<div id="calendar-page" class="page-content">

  <!-- Toolbar -->
  <div class="cal-toolbar">
    <button class="cal-nav-btn" onclick="Calendar.navigate(-1)" aria-label="Previous">&#8249;</button>
    <button class="cal-today-btn" onclick="Calendar.goToToday()">Today</button>
    <button class="cal-nav-btn" onclick="Calendar.navigate(1)" aria-label="Next">&#8250;</button>

    <div class="cal-toolbar-title" id="cal-view-title"></div>

    <div class="cal-view-toggle">
      <button class="cal-toggle-btn active" id="btn-week"   onclick="Calendar.setView('week')">Week</button>
      <button class="cal-toggle-btn"        id="btn-4day"   onclick="Calendar.setView('4day')">4 Day</button>
      <button class="cal-toggle-btn"        id="btn-month"  onclick="Calendar.setView('month')">Month</button>
      <button class="cal-toggle-btn"        id="btn-agenda" onclick="Calendar.setView('agenda')">Agenda</button>
    </div>
  </div>

  <!-- Per-person filter chips — populated by calendar.js -->
  <div id="cal-filter-chips" class="cal-filter-chips"></div>

  <!-- View container — filled by calendar.js -->
  <div id="cal-view-container"></div>

</div>
