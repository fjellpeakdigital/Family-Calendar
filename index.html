<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0D1117" />
  <title>Family Dashboard</title>
  <link rel="manifest" href="manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- ── Setup Splash ───────────────────────────────────────── -->
  <div id="setup-splash" aria-label="Setup screen">
    <h1>Family Dashboard</h1>
    <p class="subtitle">Let's connect everyone's Google Calendar so the dashboard knows what's going on.</p>

    <div id="setup-users">
      <!-- Populated by auth.js -->
    </div>

    <button id="setup-continue" class="btn btn-success" style="display:none;" onclick="window.Auth.finishSetup()">
      ✓ &nbsp; Let's Go!
    </button>
  </div>

  <!-- ── Reauth Banner ───────────────────────────────────────── -->
  <div id="reauth-banner" role="alert">
    <span>⚠️</span>
    <span id="reauth-message">Calendar session expired — tap to sign in again</span>
  </div>

  <!-- ── Main App ───────────────────────────────────────────── -->
  <div id="app" style="display:none;" aria-label="Family Dashboard">

    <!-- Header -->
    <header id="header">
      <div id="header-left">
        <div id="clock" aria-live="polite" aria-label="Current time">12:00</div>
        <div id="date-display" aria-label="Current date">Monday, January 1</div>
      </div>

      <div id="header-center">
        <div id="page-title">Calendar</div>
        <div id="nav-dots" role="tablist" aria-label="Page navigation">
          <!-- Dots rendered by app.js -->
        </div>
      </div>

      <div id="header-right">
        <div id="auth-pills">
          <!-- Auth status pills rendered by auth.js -->
        </div>
      </div>
    </header>

    <!-- Page Track -->
    <div id="page-viewport">
      <div id="page-track">
        <!-- Pages injected by app.js from pages/*.html -->
      </div>
    </div>

  </div>

  <!-- Scripts: config first, then modules -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/chores.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
