<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0D1117" />
  <title>Family Dashboard</title>
  <link rel="manifest" href="manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- ── Setup Splash ───────────────────────────────────────── -->
  <div id="setup-splash" aria-label="Setup screen">
    <h1>Family Dashboard</h1>
    <p class="subtitle">Connect a Google account to get started. You can add more accounts and manage everything via the ⚙ admin panel.</p>

    <div id="setup-users">
      <!-- Populated by auth.js -->
    </div>

    <div class="setup-actions">
      <button id="setup-add-account" class="btn btn-outline">+ Add Account</button>
      <button id="setup-continue" class="btn btn-success" style="display:none;"
              onclick="window.Auth.finishSetup()">
        ✓ &nbsp; Let's Go!
      </button>
    </div>
  </div>

  <!-- ── Event Detail Modal ────────────────────────────────────── -->
  <div id="event-modal-overlay" role="dialog" aria-modal="true" aria-label="Event details">
    <div id="event-modal" class="event-modal">
      <div id="event-modal-body"></div>
    </div>
  </div>

  <!-- ── Reauth Banner ───────────────────────────────────────── -->
  <div id="reauth-banner" role="alert">
    <span>⚠️</span>
    <span id="reauth-message">Calendar session expired — tap to sign in again</span>
  </div>

  <!-- ── Admin Overlay ──────────────────────────────────────── -->
  <div id="admin-overlay" role="dialog" aria-modal="true" aria-label="Admin settings">

    <!-- PIN Screen -->
    <div id="pin-screen" style="display:flex">
      <div class="pin-container">
        <h2 class="pin-title">Enter PIN</h2>
        <div class="pin-display">
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
        </div>
        <div id="pin-error"></div>
        <div id="pin-keypad">
          <button class="pin-key" onclick="Admin.pinKey('1')">1</button>
          <button class="pin-key" onclick="Admin.pinKey('2')">2</button>
          <button class="pin-key" onclick="Admin.pinKey('3')">3</button>
          <button class="pin-key" onclick="Admin.pinKey('4')">4</button>
          <button class="pin-key" onclick="Admin.pinKey('5')">5</button>
          <button class="pin-key" onclick="Admin.pinKey('6')">6</button>
          <button class="pin-key" onclick="Admin.pinKey('7')">7</button>
          <button class="pin-key" onclick="Admin.pinKey('8')">8</button>
          <button class="pin-key" onclick="Admin.pinKey('9')">9</button>
          <button class="pin-key pin-key-cancel" onclick="Admin.closeAdmin()">✕</button>
          <button class="pin-key" onclick="Admin.pinKey('0')">0</button>
          <button class="pin-key pin-key-back" onclick="Admin.pinKey('back')">⌫</button>
        </div>
      </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" style="display:none">
      <div class="admin-header">
        <h2>Settings</h2>
        <button id="admin-close" class="admin-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab-btn active" data-tab="people">People</button>
        <button class="admin-tab-btn" data-tab="calendars">Calendars</button>
        <button class="admin-tab-btn" data-tab="chores">Chores</button>
        <button class="admin-tab-btn" data-tab="settings">Settings</button>
      </div>
      <div id="admin-content" class="admin-content"></div>
    </div>

  </div>

  <!-- ── Main App ───────────────────────────────────────────── -->
  <div id="app" style="display:none;" aria-label="Family Dashboard">

    <!-- Header -->
    <header id="header">
      <div id="header-left">
        <div id="clock" aria-live="polite" aria-label="Current time">12:00</div>
        <div id="date-display" aria-label="Current date">Monday, January 1</div>
      </div>

      <div id="header-center">
        <div id="page-title">Calendar</div>
        <div id="nav-dots" role="tablist" aria-label="Page navigation">
          <!-- Dots rendered by app.js -->
        </div>
      </div>

      <div id="header-right">
        <button id="theme-toggle" onclick="App.toggleTheme()" aria-label="Toggle light/dark theme">🌙</button>
        <div id="auth-pills">
          <!-- Auth status pills rendered by auth.js -->
        </div>
      </div>
    </header>

    <!-- Page Track -->
    <div id="page-viewport">
      <div id="page-track">
        <!-- Pages injected by app.js from pages/*.html -->
      </div>
    </div>

    <!-- Footer -->
    <footer id="footer">
      <div id="data-status" class="data-status" aria-live="polite" role="status" title="Connection status"></div>
      <button id="admin-btn" aria-label="Open admin settings" title="Settings">⚙</button>
    </footer>

  </div>

  <!-- Apply saved theme immediately to avoid flash of wrong theme -->
  <script>
    (function() {
      var t = localStorage.getItem('dashboard_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Google Identity Services (must load before auth.js) -->
  <script src="https://accounts.google.com/gsi/client" async></script>

  <!-- Scripts: config first, then modules -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/chores.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
